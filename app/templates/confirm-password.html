{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подтверждение пароля — Temur Estate</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body>
 
  <nav class="navbar">
    <a href="{% url 'index' %}" class="navbar__logo">Temur <span>Estate</span></a>
    <button class="navbar__toggle" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </nav>
 
  <div class="navbar__drawer">
    <a href="{% url 'login' %}">Войти</a>
    <a href="{% url 'register' %}">Регистрация</a>
  </div>
 
  <section class="hero" style="min-height:100vh;">
    <div class="hero__bg"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content" style="padding:120px 24px 60px;">
 
      <div class="card" style="max-width:440px;width:100%;margin:0 auto;padding:44px 40px;cursor:default;text-align:left;">
        <div style="text-align:center;margin-bottom:32px;">
          <div style="font-size:2.5rem;margin-bottom:12px;">🛡️</div>
          <h2 class="section__title" style="font-size:1.6rem;margin-bottom:8px;">Подтверждение пароля</h2>
          <div class="card__location">Введите текущий пароль для подтверждения</div>
        </div>
 
        <div class="form">
          <div class="form__group">
            <label>Текущий пароль</label>
            <input type="password" placeholder="Введите текущий пароль" />
          </div>
          <a href="{% url 'profile' %}" class="button" style="justify-content:center;">Подтвердить</a>
        </div>
 
        <div class="divider" style="margin:24px auto;"></div>
 
        <p style="text-align:center;font-size:0.85rem;color:var(--muted);">
          Забыли пароль? <a href="{% url 'forgot-password' %}" style="color:var(--gold);">Восстановить</a>
        </p>
      </div>
 
    </div>
  </section>
 
  <script src="{% static 'app.js' %}"></script>
</body>
</html>
