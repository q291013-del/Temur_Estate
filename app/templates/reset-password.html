{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новый пароль — Temur Estate</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>
<body>

  <nav class="navbar">
    <a href="{% url 'index' %}" class="navbar__logo">Temur <span>Estate</span></a>
    <button class="navbar__toggle" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="navbar__drawer">
    <a href="{% url 'login' %}">Войти</a>
    <a href="{% url 'register' %}">Регистрация</a>
  </div>

  <section class="hero" style="min-height:100vh;">
    <div class="hero__bg"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content" style="padding:120px 24px 60px;">

      <div class="card" style="max-width:440px;width:100%;margin:0 auto;padding:44px 40px;cursor:default;text-align:left;">
        <div style="text-align:center;margin-bottom:32px;">
          <div style="font-size:2.5rem;margin-bottom:12px;">🔒</div>
          <h2 class="section__title" style="font-size:1.6rem;margin-bottom:8px;">Новый пароль</h2>
          <div class="card__location">Придумайте надёжный пароль</div>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div style="padding: 12px; margin-bottom: 24px; border-radius: 6px; font-size: 0.9rem; background: rgba(255,107,107,0.1); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3);">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form class="form" action="{% url 'reset-password' %}" method="post">
          {% csrf_token %}
          <div class="form__group">
            <label>Новый пароль</label>
            <input type="password" name="new_password" placeholder="Минимум 8 символов" required />
          </div>
          <div class="form__group">
            <label>Подтвердите пароль</label>
            <input type="password" name="confirm_password" placeholder="Повторите пароль" required />
          </div>

          <button type="submit" class="button" style="width:100%; justify-content:center; border:none; cursor:pointer; font-family:inherit; font-size:inherit;">
            Сохранить пароль
          </button>
        </form>
      </div>

    </div>
  </section>

  <script src="{% static 'app.js' %}"></script>
</body>
</html>
