{% extends 'base.html' %}
{% load static %}

{% block title %}Забыли пароль — Temur Estate{% endblock %}

{% block content %}
  <section class="hero" style="min-height:100vh;">
    <div class="hero__bg"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content" style="padding:120px 24px 60px;">

      <div class="card" style="max-width:440px;width:100%;margin:0 auto;padding:44px 40px;cursor:default;text-align:left;">
        <div style="text-align:center;margin-bottom:32px;">
          <div style="font-size:2.5rem;margin-bottom:12px;">🔑</div>
          <h2 class="section__title" style="font-size:1.6rem;margin-bottom:8px;">Восстановление пароля</h2>
          <div class="card__location">Укажите email для получения кода</div>
        </div>

        <form action="{% url 'forgot-password' %}" method="post" class="form">
          {% csrf_token %}

          <div class="form__group">
            <label>Email</label>
            <input type="email" name="email" placeholder="example@email.com" required />
          </div>

          <button type="submit" class="button" style="width:100%;justify-content:center;margin-top:8px;border:none;cursor:pointer;font-family:inherit;font-size:inherit;">
            Отправить код
          </button>
        </form>

        <div class="divider" style="margin:24px auto;"></div>

        <p style="text-align:center;font-size:0.85rem;color:var(--muted);">
          Вспомнили пароль? <a href="{% url 'login' %}" style="color:var(--gold);">Войти</a>
        </p>
      </div>

    </div>
  </section>
{% endblock content %}
