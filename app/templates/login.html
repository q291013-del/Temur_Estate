{% extends 'base.html' %}
{% load static %}

{% block title %}Войти — Temur Estate{% endblock %}

{% block content %}
  <section class="hero" style="min-height:100vh;">
    <div class="hero__bg"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content" style="padding:120px 24px 60px;">

      <div class="card" style="max-width:440px;width:100%;margin:0 auto;padding:44px 40px;cursor:default;text-align:left;">
        <div style="text-align:center;margin-bottom:32px;">
          <div class="navbar__logo" style="font-size:1.4rem;display:block;margin-bottom:8px;">Temur Estate</div>
          <div class="card__location">Войдите в свой аккаунт</div>
        </div>

        <form class="form" action="{% url 'login' %}" method="post">
          {% csrf_token %}

          {% if form.errors %}
            <div style="color:#ff6b6b; margin-bottom:16px; font-size:0.9rem; background:rgba(255,107,107,0.1); padding:10px; border-radius:6px;">
              {{ form.errors }}
            </div>
          {% endif %}

          <div class="form__group">
            <label>Логин или Email*</label>
            <input type="text" name="username" placeholder="Логин или example@email.com" required />
          </div>
          <div class="form__group">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="••••••••" required />
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:-8px; margin-bottom:16px;">
            <label style="font-size:0.85rem; color:var(--muted); text-transform:none; letter-spacing:0; display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" name="remember_me" id="remember_me" style="width:auto; margin:0;" />
              Запомнить меня
            </label>
            <a href="{% url 'forgot-password' %}" style="font-size:0.8rem;color:var(--gold);letter-spacing:0.06em;">Забыли пароль?</a>
          </div>

          <button type="submit" class="button" style="justify-content:center;margin-top:8px;width:100%;border:none;cursor:pointer;font-family:inherit;font-size:inherit;">
            Войти
          </button>
        </form>

        <div class="divider" style="margin:24px auto;"></div>

        <p style="text-align:center;font-size:0.85rem;color:var(--muted);">
          Нет аккаунта? <a href="{% url 'register' %}" style="color:var(--gold);">Зарегистрироваться</a>
        </p>
      </div>

    </div>
  </section>
{% endblock %}
